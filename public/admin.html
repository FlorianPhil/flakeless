<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flakeless Admin</title>
    <style>
      :root {
        --ink: #1f2937;
        --muted: #6d7480;
        --line: rgba(31, 41, 55, 0.12);
        --orange: #ff5a3c;
        --red: #ef476f;
        --green: #06d6a0;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at 20% 12%, rgba(255,255,255,0.92), transparent 24rem),
          linear-gradient(140deg, #fbf7ef 0%, #eef5f8 100%);
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        color: var(--ink);
      }

      .shell {
        max-width: 780px;
        margin: 0 auto;
        padding: 40px 24px 60px;
      }

      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 32px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 780;
      }

      h1 span {
        color: var(--muted);
        font-weight: 500;
        font-size: 14px;
        margin-left: 10px;
      }

      .btn {
        min-height: 36px;
        padding: 0 16px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.6);
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 760;
        color: var(--ink);
      }

      .btn:hover { background: rgba(255,255,255,0.9); }

      .btn.danger {
        color: var(--red);
        border-color: rgba(239,71,111,0.28);
      }

      .btn.danger:hover {
        background: rgba(239,71,111,0.08);
      }

      .btn.clear-all {
        color: #fff;
        background: var(--red);
        border-color: var(--red);
      }

      .btn.clear-all:hover { background: #d63060; }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 32px;
      }

      .stat-card {
        background: rgba(255,255,255,0.55);
        border: 1px solid rgba(255,255,255,0.8);
        border-radius: 14px;
        padding: 16px 20px;
        box-shadow: 0 8px 24px rgba(74,85,104,0.07);
      }

      .stat-card .value {
        font-size: 32px;
        font-weight: 780;
        line-height: 1;
      }

      .stat-card .label {
        margin-top: 4px;
        font-size: 11px;
        font-weight: 780;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .section-head h2 {
        margin: 0;
        font-size: 13px;
        font-weight: 780;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .user-list {
        display: grid;
        gap: 8px;
      }

      .user-row {
        display: grid;
        grid-template-columns: 12px minmax(0, 1fr) auto auto;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        background: rgba(255,255,255,0.55);
        border: 1px solid rgba(255,255,255,0.8);
        border-radius: 12px;
        box-shadow: 0 4px 12px rgba(74,85,104,0.06);
      }

      .user-dot {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      .user-name {
        font-weight: 760;
        font-size: 14px;
      }

      .user-id {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }

      .user-picks {
        font-size: 13px;
        font-weight: 780;
        color: var(--muted);
        white-space: nowrap;
      }

      .empty {
        padding: 40px 0;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }

      .top-dates {
        margin-top: 32px;
      }

      .date-list {
        display: grid;
        gap: 8px;
      }

      .date-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: rgba(255,255,255,0.55);
        border: 1px solid rgba(255,255,255,0.8);
        border-radius: 12px;
      }

      .date-label {
        font-weight: 760;
        font-size: 14px;
      }

      .date-bar-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .date-bar {
        height: 8px;
        border-radius: 4px;
        background: var(--orange);
        min-width: 8px;
      }

      .date-count {
        font-size: 13px;
        font-weight: 780;
        color: var(--muted);
        white-space: nowrap;
      }

      #toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(12px);
        padding: 10px 20px;
        background: var(--ink);
        color: #fff;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 760;
        opacity: 0;
        pointer-events: none;
        transition: opacity 200ms, transform 200ms;
      }

      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <h1>Flakeless <span>Admin</span></h1>
        <div style="display:flex;gap:8px">
          <button class="btn" id="refresh-btn">Refresh</button>
          <button class="btn clear-all" id="clear-all-btn">Clear all</button>
        </div>
      </header>

      <div class="stats">
        <div class="stat-card">
          <div class="value" id="stat-users">-</div>
          <div class="label">Participants</div>
        </div>
        <div class="stat-card">
          <div class="value" id="stat-picks">-</div>
          <div class="label">Total picks</div>
        </div>
        <div class="stat-card">
          <div class="value" id="stat-top">-</div>
          <div class="label">Best date overlap</div>
        </div>
      </div>

      <div class="section-head">
        <h2>Participants</h2>
      </div>
      <div class="user-list" id="user-list"></div>

      <div class="top-dates">
        <div class="section-head">
          <h2>Top dates</h2>
        </div>
        <div class="date-list" id="date-list"></div>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      let stateData = { users: {}, picks: {} };

      async function loadData() {
        const [usersRes, stateRes] = await Promise.all([
          fetch("/api/admin/users"),
          fetch("/api/state")
        ]);
        const users = await usersRes.json();
        stateData = await stateRes.json();
        render(users);
      }

      function render(users) {
        const totalPicks = users.reduce((n, u) => n + Number(u.pick_count), 0);

        const dateCounts = {};
        for (const [dateKey, uids] of Object.entries(stateData.picks)) {
          dateCounts[dateKey] = uids.length;
        }
        const maxOverlap = Math.max(0, ...Object.values(dateCounts));

        document.getElementById("stat-users").textContent = users.length;
        document.getElementById("stat-picks").textContent = totalPicks;
        document.getElementById("stat-top").textContent = maxOverlap === 0 ? "-" : `${maxOverlap} people`;

        const userList = document.getElementById("user-list");
        if (users.length === 0) {
          userList.innerHTML = '<div class="empty">No participants yet.</div>';
        } else {
          userList.innerHTML = users.map(u => `
            <div class="user-row" data-id="${u.id}">
              <div class="user-dot" style="background:${u.color}"></div>
              <div>
                <div class="user-name">${u.name}</div>
                <div class="user-id">${u.id}</div>
              </div>
              <div class="user-picks">${u.pick_count} pick${u.pick_count == 1 ? "" : "s"}</div>
              <button class="btn danger" onclick="deleteUser('${u.id}', '${u.name}')">Remove</button>
            </div>
          `).join("");
        }

        const sortedDates = Object.entries(dateCounts)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 10);

        const dateList = document.getElementById("date-list");
        if (sortedDates.length === 0) {
          dateList.innerHTML = '<div class="empty">No picks yet.</div>';
        } else {
          const max = sortedDates[0][1];
          dateList.innerHTML = sortedDates.map(([dateKey, count]) => {
            const label = new Date(dateKey + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "long", day: "numeric" });
            const width = Math.round((count / max) * 160);
            return `
              <div class="date-row">
                <div class="date-label">${label}</div>
                <div class="date-bar-wrap">
                  <div class="date-bar" style="width:${width}px"></div>
                  <div class="date-count">${count} ${count === 1 ? "person" : "people"}</div>
                </div>
              </div>
            `;
          }).join("");
        }
      }

      async function deleteUser(userId, name) {
        if (!confirm(`Remove ${name} and all their picks?`)) return;
        await fetch(`/api/admin/users?userId=${encodeURIComponent(userId)}`, { method: "DELETE" });
        toast(`${name} removed`);
        loadData();
      }

      document.getElementById("clear-all-btn").addEventListener("click", async () => {
        if (!confirm("Delete all participants and picks? This cannot be undone.")) return;
        const users = Array.from(document.querySelectorAll(".user-row")).map(el => el.dataset.id);
        await Promise.all(users.map(id => fetch(`/api/admin/users?userId=${encodeURIComponent(id)}`, { method: "DELETE" })));
        toast("All data cleared");
        loadData();
      });

      document.getElementById("refresh-btn").addEventListener("click", loadData);

      function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2200);
      }

      loadData();
    </script>
  </body>
</html>
